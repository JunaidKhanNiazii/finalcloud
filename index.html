<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <style>
        /* Centers the card on the screen */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Card Container */
        .profile-card {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 280px;
        }

        /* Name Styling */
        .name {
            font-size: 22px;
            font-weight: bold;
            color: #333333;
            margin: 0 0 8px 0;
        }

        /* Roll Number Styling */
        .roll-no {
            font-size: 14px;
            color: #666666;
            background-color: #eef2f3;
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2 class="name">Alex Morgan</h2>
        <p class="roll-no">Roll No: 2026-042</p>
    </div>

</body>
</html>
